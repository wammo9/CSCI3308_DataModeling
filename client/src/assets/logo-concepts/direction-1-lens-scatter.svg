<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Direction 1: Precision Lens — Clean magnifying glass with projected scatter points -->
  <defs>
    <linearGradient id="d1-ring" x1="100" y1="80" x2="340" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B3A36"/>
      <stop offset="1" stop-color="#2A5C54"/>
    </linearGradient>
    <linearGradient id="d1-lens" x1="160" y1="120" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F4F0" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#C5DDD6" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="d1-handle" x1="340" y1="340" x2="440" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C88B3C"/>
      <stop offset="1" stop-color="#A06E2C"/>
    </linearGradient>
    <filter id="d1-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="d1-clip">
      <circle cx="220" cy="220" r="130"/>
    </clipPath>
  </defs>

  <!-- Handle -->
  <rect x="330" y="330" width="28" height="140" rx="14" transform="rotate(-45 344 400)" fill="url(#d1-handle)"/>
  <rect x="330" y="330" width="28" height="50" rx="14" transform="rotate(-45 344 400)" fill="#D4993F" opacity="0.4"/>

  <!-- Ring -->
  <circle cx="220" cy="220" r="148" stroke="url(#d1-ring)" stroke-width="22" fill="none"/>
  <circle cx="220" cy="220" r="148" stroke="white" stroke-width="1" stroke-opacity="0.15" fill="none"/>

  <!-- Lens fill -->
  <circle cx="220" cy="220" r="130" fill="url(#d1-lens)"/>

  <!-- Grid inside lens -->
  <g clip-path="url(#d1-clip)" stroke="#1B3A36" stroke-opacity="0.08" stroke-width="1">
    <line x1="90" y1="160" x2="350" y2="160"/>
    <line x1="90" y1="220" x2="350" y2="220"/>
    <line x1="90" y1="280" x2="350" y2="280"/>
    <line x1="160" y1="90" x2="160" y2="350"/>
    <line x1="220" y1="90" x2="220" y2="350"/>
    <line x1="280" y1="90" x2="280" y2="350"/>
  </g>

  <!-- PC1 axis -->
  <g clip-path="url(#d1-clip)">
    <line x1="120" y1="300" x2="320" y2="140" stroke="#1B3A36" stroke-width="2.5" stroke-opacity="0.25" stroke-dasharray="6 4"/>
    <!-- PC2 axis -->
    <line x1="140" y1="140" x2="300" y2="300" stroke="#1B3A36" stroke-width="2.5" stroke-opacity="0.18" stroke-dasharray="6 4"/>
  </g>

  <!-- Scatter cluster 1 (teal) -->
  <g clip-path="url(#d1-clip)" filter="url(#d1-glow)">
    <circle cx="168" cy="186" r="11" fill="#2A8C7A"/>
    <circle cx="188" cy="170" r="8" fill="#2A8C7A" opacity="0.85"/>
    <circle cx="152" cy="204" r="7" fill="#3BA08C" opacity="0.75"/>
    <circle cx="182" cy="198" r="9" fill="#2A8C7A" opacity="0.9"/>
    <circle cx="198" cy="182" r="6" fill="#3BA08C" opacity="0.7"/>
  </g>

  <!-- Scatter cluster 2 (amber) -->
  <g clip-path="url(#d1-clip)" filter="url(#d1-glow)">
    <circle cx="268" cy="228" r="12" fill="#C88B3C"/>
    <circle cx="288" cy="212" r="8" fill="#D4993F" opacity="0.85"/>
    <circle cx="254" cy="244" r="7" fill="#C88B3C" opacity="0.75"/>
    <circle cx="278" cy="248" r="9" fill="#D4993F" opacity="0.85"/>
    <circle cx="296" cy="234" r="6" fill="#C88B3C" opacity="0.7"/>
  </g>

  <!-- Scatter cluster 3 (light) -->
  <g clip-path="url(#d1-clip)" filter="url(#d1-glow)">
    <circle cx="210" cy="296" r="10" fill="#F0E6D4"/>
    <circle cx="232" cy="282" r="7" fill="#E8DAC4" opacity="0.9"/>
    <circle cx="194" cy="284" r="8" fill="#F0E6D4" opacity="0.8"/>
    <circle cx="228" cy="306" r="6" fill="#E8DAC4" opacity="0.75"/>
  </g>

  <!-- Lens highlight -->
  <ellipse cx="185" cy="165" rx="45" ry="30" fill="white" opacity="0.18" transform="rotate(-25 185 165)"/>

  <!-- Wordmark -->
  <text x="256" y="478" text-anchor="middle" fill="#1B3A36" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="4">
    <tspan>MODEL</tspan><tspan fill="#C88B3C">SCOPE</tspan>
  </text>
</svg>
