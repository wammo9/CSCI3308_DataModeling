<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Direction 2: Projection Mark — Abstract dimensional reduction: 3D cube projecting down to 2D plane -->
  <defs>
    <linearGradient id="d2-face-top" x1="180" y1="80" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A5C54"/>
      <stop offset="1" stop-color="#1B3A36"/>
    </linearGradient>
    <linearGradient id="d2-face-right" x1="320" y1="140" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B3A36"/>
      <stop offset="1" stop-color="#132926"/>
    </linearGradient>
    <linearGradient id="d2-face-left" x1="120" y1="200" x2="260" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A7A6E"/>
      <stop offset="1" stop-color="#2A5C54"/>
    </linearGradient>
    <linearGradient id="d2-shadow" x1="180" y1="380" x2="340" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C88B3C" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#C88B3C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shadow / projection plane -->
  <ellipse cx="256" cy="400" rx="120" ry="28" fill="url(#d2-shadow)"/>

  <!-- Projection lines (3D to 2D) -->
  <line x1="180" y1="200" x2="180" y2="388" stroke="#C88B3C" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 6"/>
  <line x1="332" y1="200" x2="332" y2="388" stroke="#C88B3C" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 6"/>
  <line x1="256" y1="100" x2="256" y2="370" stroke="#C88B3C" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="4 6"/>

  <!-- Isometric cube — top face -->
  <path d="M256 100 L380 172 L256 244 L132 172 Z" fill="url(#d2-face-top)" opacity="0.92"/>
  <!-- Left face -->
  <path d="M132 172 L256 244 L256 352 L132 280 Z" fill="url(#d2-face-left)" opacity="0.88"/>
  <!-- Right face -->
  <path d="M256 244 L380 172 L380 280 L256 352 Z" fill="url(#d2-face-right)" opacity="0.85"/>

  <!-- Edge highlights -->
  <path d="M256 100 L380 172 L256 244 L132 172 Z" stroke="white" stroke-width="1" stroke-opacity="0.12" fill="none"/>
  <line x1="256" y1="244" x2="256" y2="352" stroke="white" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Data points inside cube (visible on top face) -->
  <circle cx="220" cy="168" r="6" fill="#C88B3C" opacity="0.9"/>
  <circle cx="248" cy="154" r="5" fill="#D4993F" opacity="0.8"/>
  <circle cx="272" cy="176" r="7" fill="#C88B3C" opacity="0.85"/>
  <circle cx="236" cy="188" r="5" fill="#D4993F" opacity="0.75"/>
  <circle cx="290" cy="196" r="4" fill="#C88B3C" opacity="0.7"/>
  <circle cx="204" cy="182" r="5.5" fill="#D4993F" opacity="0.8"/>

  <!-- Projected points on shadow plane (2D reduction) -->
  <circle cx="220" cy="395" r="5" fill="#C88B3C" opacity="0.6"/>
  <circle cx="248" cy="393" r="4" fill="#D4993F" opacity="0.55"/>
  <circle cx="272" cy="397" r="5.5" fill="#C88B3C" opacity="0.5"/>
  <circle cx="236" cy="399" r="4" fill="#D4993F" opacity="0.45"/>
  <circle cx="290" cy="396" r="3.5" fill="#C88B3C" opacity="0.4"/>
  <circle cx="204" cy="398" r="4.5" fill="#D4993F" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="256" y="478" text-anchor="middle" fill="#1B3A36" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="5">
    <tspan>MODEL</tspan><tspan fill="#C88B3C">SCOPE</tspan>
  </text>
</svg>
