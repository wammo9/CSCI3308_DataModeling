services:
  db:
    image: postgres
    env_file: .env
    expose:
      - '5432'
    volumes:
      - group-project:/var/lib/postgresql
      - ./src/init_data:/docker-entrypoint-initdb.d
  web:
    image: node:lts
    user: 'node'
    working_dir: /repository
    env_file: .env
    environment:
      - NODE_ENV=test
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/repository
    command: sh -c "npm install && npm test"
volumes:
  group-project: