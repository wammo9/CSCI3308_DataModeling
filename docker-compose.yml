services:
  db:
    image: postgres:16-alpine
    container_name: modelscope-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: modelscope_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./server/src/init_data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: modelscope-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://postgres:pwd@db:5432/modelscope_db
      JWT_SECRET: modelscope-jwt-secret-change-in-production
      NODE_ENV: development
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: modelscope-client
    depends_on:
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  db_data:
